name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Job 1: Lint & Build ──────────────────────────────────────────────────────
  lint-and-build:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other warnings as informational (exit-zero)
          flake8 app.py --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  # ── Job 2: Docker Image Assembly ─────────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # Set to true and add registry secrets to publish
          tags: aceest-fitness:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: docker images aceest-fitness

  # ── Job 3: Automated Testing ─────────────────────────────────────────────────
  test:
    name: Automated Testing (Pytest in Docker)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t aceest-test .

      - name: Run Pytest suite inside container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests:/app/tests" \
            aceest-test \
            python -m pytest tests/ -v --tb=short

      - name: Upload test results (optional artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: "*.xml"
          if-no-files-found: ignore
