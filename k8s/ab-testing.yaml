# Version A
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-ab
      version: "a"
  template:
    metadata:
      labels:
        app: aceest-ab
        version: "a"
    spec:
      containers:
      - name: aceest-fitness
        image: akshaya45/aceest-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: VERSION
          value: "A"
---
# Version B
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-ab
      version: "b"
  template:
    metadata:
      labels:
        app: aceest-ab
        version: "b"
    spec:
      containers:
      - name: aceest-fitness
        image: akshaya45/aceest-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: VERSION
          value: "B"
---
# Service A
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-service-a
spec:
  selector:
    app: aceest-ab
    version: "a"
  type: NodePort
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    nodePort: 30005
---
# Service B
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-service-b
spec:
  selector:
    app: aceest-ab
    version: "b"
  type: NodePort
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    nodePort: 30006