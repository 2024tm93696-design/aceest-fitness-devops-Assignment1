apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-rolling
  labels:
    app: aceest-fitness-rolling
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: aceest-fitness-rolling
  template:
    metadata:
      labels:
        app: aceest-fitness-rolling
    spec:
      containers:
      - name: aceest-fitness
        image: akshaya45/aceest-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-rolling-service
spec:
  selector:
    app: aceest-fitness-rolling
  type: NodePort
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    nodePort: 30002